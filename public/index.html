<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynchroList — Premium Syncing To-Do Dashboard</title>
  
  <!-- Modern Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-decor">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <div class="dashboard-wrapper">
    <!-- Header Section -->
    <header class="app-header">
      <div class="header-main">
        <div class="brand">
          <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
          <h1>SynchroList</h1>
        </div>
        <!-- Persistent Sync Status Indicator -->
        <div id="sync-indicator" class="sync-indicator status-synced">
          <span class="status-dot"></span>
          <span id="sync-text" class="status-text">Synced</span>
        </div>
      </div>
      <p class="header-tagline">Offline-first local-to-cloud smart sync task manager.</p>
    </header>

    <!-- Task Stats Panel -->
    <section class="stats-panel glass-card">
      <div class="stat-item">
        <span class="stat-value" id="stats-total">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stats-completed">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stats-completion-rate">0%</span>
        <span class="stat-label">Completion Rate</span>
      </div>
    </section>

    <!-- Main Content Grid -->
    <main class="main-content">
      <!-- Input Panel -->
      <section class="input-section glass-card">
        <h2 class="section-title">Create New Task</h2>
        <form id="todo-form" class="todo-form">
          <div class="form-group text-group">
            <label for="task-text">Task Description</label>
            <input type="text" id="task-text" placeholder="What needs to be done?" required autocomplete="off">
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label for="task-priority">Priority</label>
              <div class="select-wrapper">
                <select id="task-priority" required>
                  <option value="low">Low</option>
                  <option value="medium" selected>Medium</option>
                  <option value="high">High</option>
                </select>
              </div>
            </div>
            
            <div class="form-group">
              <label for="task-due-date">Due Date</label>
              <input type="date" id="task-due-date" required>
            </div>
          </div>

          <button type="submit" class="btn-submit">
            <span>Add Task</span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </form>
      </section>

      <!-- Task List and Filters Panel -->
      <section class="list-section glass-card">
        <div class="list-header">
          <h2 class="section-title">Your Tasks</h2>
          
          <!-- Filters & Controls -->
          <div class="filter-controls">
            <!-- Search Input -->
            <div class="search-box">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" id="filter-search" placeholder="Search tasks..." autocomplete="off">
            </div>

            <!-- Complete/Active filter -->
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all">All</button>
              <button class="filter-btn" data-filter="active">Active</button>
              <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Sorting selector -->
            <div class="sort-group">
              <label for="sort-select">Sort by</label>
              <div class="select-wrapper select-sm">
                <select id="sort-select">
                  <option value="dueDate">Due Date</option>
                  <option value="priority">Priority</option>
                  <option value="status">Status</option>
                  <option value="createdAt" selected>Date Created</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Task List Container -->
        <div id="todo-list" class="todo-list">
          <!-- Tasks will be dynamically injected here -->
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <h3>No tasks found</h3>
            <p>Add a task above or adjust your filters to get started.</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Undo Toast Container -->
  <div id="toast-container" class="toast-container">
    <!-- Example structure of a toast:
    <div class="toast animate-in">
      <span class="toast-message">Task deleted</span>
      <button class="btn-undo">Undo</button>
      <button class="btn-close-toast">&times;</button>
    </div>
    -->
  </div>

  <!-- App JavaScript logic -->
  <script src="app.js"></script>
</body>
</html>
